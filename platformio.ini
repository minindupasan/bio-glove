; PlatformIO Project Configuration
; ESP32-S3-N16R8 DevKit — Biosensor Glove Firmware

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; N16R8 variant: 16MB Flash (QIO), 8MB PSRAM (OPI)
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

monitor_speed = 115200

; Make include/ visible to all compilation units
build_flags = -I include

; Library dependencies
; - SparkFun MAX3010x provides MAX30105.h, heartRate.h, spo2_algorithm.h
; - MPU6050 and CJMCU-30205 are driven via raw I2C (no library needed)
lib_deps =
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.2
